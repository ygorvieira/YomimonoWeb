services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yomimono
      POSTGRES_USER: yomimono
      POSTGRES_PASSWORD: yomimono
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yomimono"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=yomimono;Username=yomimono;Password=yomimono"
      Jwt__Secret: "supersecretkeyyomimono2024!@#$%&"
      Jwt__Issuer: "Yomimono"
      Jwt__Audience: "YomimonoWeb"
      Jwt__ExpireMinutes: "120"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  pgdata:
