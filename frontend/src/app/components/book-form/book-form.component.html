<div class="container">
  <a routerLink="/books" class="btn-back">Voltar</a>

  <h2>{{ isEditMode ? 'Editar Livro' : 'Novo Livro' }}</h2>

  <div *ngIf="loading" class="loading">Carregando...</div>
  <div *ngIf="successMessage" class="success">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

  <form *ngIf="!loading" (ngSubmit)="onSubmit()" class="book-form">
    <div class="form-group">
      <label for="title">Título *</label>
      <input id="title" name="title" [(ngModel)]="model.title" required />
    </div>

    <div class="form-group">
      <label>Autor(es) *</label>
      <div class="author-tags" *ngIf="model.authorIds.length > 0">
        <span class="author-tag" *ngFor="let author of selectedAuthors">
          {{ author.name }}
          <span class="author-tag-remove" (click)="removeAuthor(author.id)">&times;</span>
        </span>
      </div>
      <div class="author-select">
        <button type="button" class="author-select-trigger" [class.open]="authorDropdownOpen"
                (click)="authorDropdownOpen = !authorDropdownOpen">
          {{ selectedAuthorNames() }}
        </button>
        <div class="author-dropdown" *ngIf="authorDropdownOpen">
          <div class="author-search">
            <input [(ngModel)]="authorSearchTerm" name="authorSearch" placeholder="Buscar autor..." />
          </div>
          <div class="author-dropdown-list">
            <label class="author-dropdown-item" *ngFor="let author of filteredAuthors">
              <input type="checkbox" [checked]="model.authorIds.includes(author.id)"
                     (change)="toggleAuthor(author.id)" />
              {{ author.name }}
            </label>
          </div>
          <div class="author-add-inline">
            <input [(ngModel)]="newAuthorName" name="newAuthor" placeholder="Novo autor..." />
            <button type="button" class="btn-primary" (click)="addNewAuthor()">Adicionar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Organizador(es)</label>
      <div class="organizer-tags" *ngIf="(model.organizerIds ?? []).length > 0">
        <span class="organizer-tag" *ngFor="let org of selectedOrganizers">
          {{ org.name }}
          <span class="organizer-tag-remove" (click)="removeOrganizer(org.id)">&times;</span>
        </span>
      </div>
      <div class="organizer-select">
        <button type="button" class="organizer-select-trigger" [class.open]="organizerDropdownOpen"
                (click)="organizerDropdownOpen = !organizerDropdownOpen">
          {{ selectedOrganizerNames() }}
        </button>
        <div class="organizer-dropdown" *ngIf="organizerDropdownOpen">
          <div class="organizer-search">
            <input [(ngModel)]="organizerSearchTerm" name="organizerSearch" placeholder="Buscar organizador..." />
          </div>
          <div class="organizer-dropdown-list">
            <label class="organizer-dropdown-item" *ngFor="let author of filteredOrganizers">
              <input type="checkbox" [checked]="(model.organizerIds ?? []).includes(author.id)"
                     (change)="toggleOrganizer(author.id)" />
              {{ author.name }}
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" [(ngModel)]="model.isTradePaperback" name="isTradePaperback" />
        Encadernado (Trade Paperback)
      </label>
    </div>

    <div class="form-group" *ngIf="model.isTradePaperback">
      <label for="tradeEdition">Edição</label>
      <input id="tradeEdition" name="tradeEdition" [(ngModel)]="model.tradeEdition" />
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" [(ngModel)]="model.isDigital" name="isDigital" />
        Livro Digital
      </label>
    </div>

    <div class="form-group">
      <label for="publisher">Editora *</label>
      <input id="publisher" name="publisher" [(ngModel)]="model.publisher" required />
    </div>

    <div class="form-group">
      <label>Gênero(s) *</label>
      <div class="genre-tags" *ngIf="model.genreIds.length > 0">
        <span class="genre-tag" *ngFor="let genre of selectedGenres">
          {{ genre.name }}
          <span class="genre-tag-remove" (click)="removeGenre(genre.id)">&times;</span>
        </span>
      </div>
      <div class="genre-select">
        <button type="button" class="genre-select-trigger" [class.open]="genreDropdownOpen"
                (click)="genreDropdownOpen = !genreDropdownOpen">
          {{ selectedGenreNames() }}
        </button>
        <div class="genre-dropdown" *ngIf="genreDropdownOpen">
          <div class="genre-search">
            <input [(ngModel)]="genreSearchTerm" name="genreSearch" placeholder="Buscar gênero..." />
          </div>
          <div class="genre-dropdown-list">
            <label class="genre-dropdown-item" *ngFor="let genre of filteredGenres">
              <input type="checkbox" [checked]="model.genreIds.includes(genre.id)"
                     (change)="toggleGenre(genre.id)" />
              {{ genre.name }}
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="publicationYear">Ano de Publicação *</label>
      <input id="publicationYear" name="publicationYear" type="number" [(ngModel)]="model.publicationYear" required />
    </div>

    <div class="form-group">
      <label for="pageCount">Número de Páginas (opcional)</label>
      <input id="pageCount" name="pageCount" type="number" [(ngModel)]="model.pageCount" [disabled]="model.isDigital === true" />
    </div>

    <div class="form-group">
      <label for="readingStatus">Status de Leitura</label>
      <select id="readingStatus" name="readingStatus" [(ngModel)]="model.readingStatus">
        <option [ngValue]="null">--</option>
        <option value="Lendo">Lendo</option>
        <option value="Lido">Lido</option>
        <option value="Relendo">Relendo</option>
        <option value="Relido">Relido</option>
        <option value="Abandonado">Abandonado</option>
      </select>
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" [(ngModel)]="model.isLiked" name="isLiked" />
        Gostei
      </label>
    </div>

    <div class="form-group">
      <label for="description">Descrição</label>
      <textarea id="description" name="description" [(ngModel)]="model.description" rows="4"></textarea>
    </div>

    <div class="form-group">
      <label for="coverUrl">URL da Capa</label>
      <input id="coverUrl" name="coverUrl" [(ngModel)]="model.coverUrl" />
    </div>

    <button type="submit" [disabled]="submitting" class="btn-primary">
      {{ submitting ? 'Salvando...' : (isEditMode ? 'Atualizar' : 'Cadastrar') }}
    </button>
  </form>
</div>
